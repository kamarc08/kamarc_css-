
<html>
<head>
    <title>EXERCISE ACTIVITY </title>

    <style>
        body {
            background-color: #eeeeee;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: red;
        }

        .blue-box {
            background-color: darkblue;
            color: cyan;
            padding: 10px;
            margin: 10px 0;
        }

        .center-title {
            text-align: center;
            color: red;
        }

        .container {
            background-color:darkgreen;
            width: 60%;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        .container h2 {
            color:darkred;
        }

        .container p {
            color: blue;
        }

        button {
            background-color: yellow;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        

    </style>

</head>

<body>
<p> EXERCISE 1</p>

    <h1>CSS is great</h1>

    <div class="blue-box">
        You can style text.
    </div>

    <div class="blue-box">
        And create layouts and special effects.
    </div>

    <p>EXERCISE 2</p>
       
   

    <h1 class="center-title">Welcome to practice</h1>

    <div class="container">
        <h2>This is a heading</h2>
        <p>This is a paragraph</p>
        <button>This is a button</button>
    </div>

</body>
</html>
